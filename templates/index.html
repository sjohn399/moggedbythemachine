<html>
	<head>
		<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta2/dist/htmx.min.js"></script>	
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&display=swap" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet" />
	</head>
	<body>
		<div class="feed">
			<div class="title-and-nav">
				<h1 class="title">Mogged By The Machine</h1>
				<p class="subtitle">
					<p><i>If not Beautiful and Useful</i></p>
					<p><i>I'll take Useless and Beautiful</i></p>
					<p><i>And settle for Useful and Ugly</i></p>
					<p><i>But no more Ugly and Useless.</i></p>
				<p>
				<div class="ballsack">
					<svg viewBox="0 0 100 100" xmlns="https://www.w3.org/2000/svg">
						<circle class="roll roll-grey" fill="grey" r="10"/>
						<circle class="roll roll-black" r="10"/>
						<circle class="roll roll-red" fill="#D94427" r="10"/>
						<text x="50" y="50" class="animation-text" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12" fill="black">
							you're gay...
						</text>
					</svg>
				</div>
			</div>
			<div class="posts">
				{{ range . }}
				 {{ template "post" . }}
				{{ end }}
			</div>
		</div>
	</body>
</html>
